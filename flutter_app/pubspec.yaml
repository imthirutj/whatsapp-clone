name: schatapp
description: A WhatsApp clone messaging app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  socket_io_client: ^2.0.3+1
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.0
  intl: ^0.18.0
  timeago: ^3.6.0
  google_fonts: ^8.0.2
  emoji_picker_flutter: ^3.1.0
  file_picker: ^8.0.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
