// ─── AVATAR ──────────────────────────────────────────────────────────────────
const Avatar = ({ contact, size = 44, showOnline = false }) => (
  <div style={{ position: "relative", flexShrink: 0 }}>
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: contact.color, color: "#fff",
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: size * 0.34, fontWeight: 500, fontFamily: "'Google Sans', sans-serif",
      letterSpacing: 0.5,
    }}>{contact.avatar}</div>
    {showOnline && contact.online && (
      <div style={{
        position: "absolute", bottom: 1, right: 1,
        width: size * 0.27, height: size * 0.27,
        borderRadius: "50%", background: "#43A047",
        border: "2px solid #fff"
      }} />
    )}
  </div>
);

// ─── M3 FAB ──────────────────────────────────────────────────────────────────
const FAB = ({ icon, onClick, color, label }) => (
  <button onClick={onClick} style={{
    position: "absolute", bottom: 72, right: 14,
    background: color,
    border: "none", cursor: "pointer",
    borderRadius: label ? 16 : "50%",
    width: label ? "auto" : 56, height: 56,
    display: "flex", alignItems: "center", justifyContent: "center",
    gap: 8, padding: label ? "0 20px 0 16px" : 0,
    boxShadow: "0 3px 8px rgba(0,0,0,0.25), 0 1px 3px rgba(0,0,0,0.15)",
    fontFamily: "'Google Sans', sans-serif",
    fontSize: 14, fontWeight: 500, color: "#fff",
    zIndex: 10,
  }}>
    <Icon name={icon} size={24} color="#fff" />
    {label && <span>{label}</span>}
  </button>
);

// ─── M3 RIPPLE BUTTON ────────────────────────────────────────────────────────
const RippleBtn = ({ onClick, children, style = {} }) => {
  const [ripple, setRipple] = useState(false);
  return (
    <button onClick={onClick} onMouseDown={() => { setRipple(true); setTimeout(() => setRipple(false), 300); }}
      style={{ background: ripple ? "rgba(0,0,0,0.06)" : "transparent", border: "none", cursor: "pointer", borderRadius: 50, padding: 8, display: "flex", alignItems: "center", justifyContent: "center", transition: "background 0.15s", ...style }}>
      {children}
    </button>
  );
};

// ─── CHATS SCREEN ─────────────────────────────────────────────────────────────
const ChatsScreen = ({ onOpenChat, m3 }) => {
  const [search, setSearch] = useState("");
  const [searchFocused, setSearchFocused] = useState(false);

  const filtered = CHAT_LIST.filter(c => {
    const contact = CONTACTS.find(x => x.id === c.contactId);
    return contact.name.toLowerCase().includes(search.toLowerCase()) || c.lastMsg.toLowerCase().includes(search.toLowerCase());
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: m3.surface }}>
      {/* M3 Top App Bar */}
      <div style={{ padding: "8px 4px 4px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontFamily: "'Google Sans', sans-serif", fontSize: 22, fontWeight: 400, color: m3.onSurface }}>WhatsApp</span>
        <div style={{ display: "flex", alignItems: "center" }}>
          <RippleBtn><Icon name="camera" size={22} color={m3.onSurfaceVariant} /></RippleBtn>
          <RippleBtn><Icon name="search" size={22} color={m3.onSurfaceVariant} /></RippleBtn>
          <RippleBtn><Icon name="more_vert" size={22} color={m3.onSurfaceVariant} /></RippleBtn>
        </div>
      </div>

      {/* M3 Search bar */}
      <div style={{ padding: "4px 16px 10px" }}>
        <div style={{
          display: "flex", alignItems: "center", gap: 10,
          background: m3.surfaceVariant, borderRadius: 28, padding: "10px 16px",
          border: searchFocused ? `2px solid ${m3.primary}` : "2px solid transparent",
          transition: "border 0.2s"
        }}>
          <Icon name="search" size={18} color={m3.onSurfaceVariant} />
          <input
            value={search} onChange={e => setSearch(e.target.value)}
            onFocus={() => setSearchFocused(true)} onBlur={() => setSearchFocused(false)}
            placeholder="Ask Meta AI or Search"
            style={{ border: "none", background: "none", outline: "none", fontSize: 14, color: m3.onSurface, width: "100%", fontFamily: "'Roboto', sans-serif" }}
          />
        </div>
      </div>

      {/* Chat list */}
      <div style={{ flex: 1, overflowY: "auto" }}>
        {filtered.map(c => <ChatRow key={c.contactId} chat={c} onOpen={onOpenChat} m3={m3} />)}
      </div>

      {/* M3 FAB */}
      <FAB icon="new_chat" color={m3.primary} onClick={() => {}} />
    </div>
  );
};

const ChatRow = ({ chat, onOpen, m3 }) => {
  const contact = CONTACTS.find(c => c.id === chat.contactId);
  const [pressed, setPressed] = useState(false);
  return (
    <div
      onClick={() => onOpen(chat.contactId)}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)}
      style={{
        display: "flex", alignItems: "center", gap: 14,
        padding: "10px 16px", cursor: "pointer",
        background: pressed ? "rgba(0,0,0,0.05)" : "transparent",
        transition: "background 0.15s"
      }}
    >
      <Avatar contact={contact} size={50} showOnline />
      <div style={{ flex: 1, minWidth: 0, borderBottom: `1px solid ${m3.surfaceVariant}`, paddingBottom: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
          <span style={{ fontFamily: "'Google Sans', sans-serif", fontWeight: 500, fontSize: 15.5, color: m3.onSurface }}>{contact.name}</span>
          <span style={{ fontSize: 12, color: chat.unread > 0 ? m3.primary : m3.onSurfaceVariant, fontFamily: "'Roboto', sans-serif" }}>{chat.time}</span>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 13.5, color: m3.onSurfaceVariant, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 200, fontFamily: "'Roboto', sans-serif" }}>
            {chat.lastMsg}
          </span>
          {chat.unread > 0 && (
            <div style={{
              minWidth: 20, height: 20, borderRadius: 10, background: m3.primary,
              color: "#fff", fontSize: 11, fontWeight: 600,
              display: "flex", alignItems: "center", justifyContent: "center", padding: "0 5px",
              fontFamily: "'Roboto', sans-serif"
            }}>{chat.unread}</div>
          )}
        </div>
      </div>
    </div>
  );
};

// ─── CHAT SCREEN ─────────────────────────────────────────────────────────────
const EMOJIS = ["😊","😂","❤️","👍","🙏","😍","🎉","😭","🔥","✨","😅","🤣","💪","😎","🤔","👏","😢","🥰","😜","🤗","😤","🥳","💯","🎊","😋","🤩","😴","🤯","😬","🙌","👀","💀","😱","🤦","🤷","🦋","🌟","💥","🎯","🏆","🍕","🍔","🎮","📱","💻","🌈","🌸","🦄","🐶","🐱"];

const ChatScreen = ({ contactId, onBack, m3 }) => {
  const contact = CONTACTS.find(c => c.id === contactId);
  const [messages, setMessages] = useState(INITIAL_CHATS[contactId] || []);
  const [input, setInput] = useState("");
  const [showMenu, setShowMenu] = useState(false);
  const [showEmoji, setShowEmoji] = useState(false);
  const scrollRef = useRef(null);
  const inputRef = useRef(null);
  const menuItems = ["View contact", "Media, links and docs", "Search", "Mute notifications", "Disappearing messages", "Clear chat"];

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages]);

  const send = () => {
    if (!input.trim()) return;
    const newMsg = { id: Date.now(), from: "me", text: input.trim(), time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }), status: "sent" };
    setMessages(prev => [...prev, newMsg]);
    setInput("");
    setTimeout(() => setMessages(prev => prev.map(m => m.id === newMsg.id ? { ...m, status: "delivered" } : m)), 1000);
  };

  // Group consecutive messages from same sender
  const grouped = messages.reduce((acc, msg) => {
    const last = acc[acc.length - 1];
    if (last && last.from === msg.from) { last.msgs.push(msg); }
    else acc.push({ from: msg.from, msgs: [msg] });
    return acc;
  }, []);

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "#ECE5DD" }}>
      {/* M3 Top App Bar for chat */}
      <div style={{ background: m3.surface, padding: "6px 4px 6px 4px", display: "flex", alignItems: "center", gap: 2, boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
        <RippleBtn onClick={onBack}><Icon name="back" size={24} color={m3.primary} /></RippleBtn>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, cursor: "pointer" }}>
          <Avatar contact={contact} size={40} showOnline />
          <div>
            <div style={{ fontFamily: "'Google Sans', sans-serif", fontWeight: 500, fontSize: 16, color: m3.onSurface, lineHeight: 1.2 }}>{contact.name}</div>
            <div style={{ fontSize: 12, color: contact.online ? m3.primary : m3.onSurfaceVariant, fontFamily: "'Roboto', sans-serif" }}>
              {contact.online ? "Active now" : contact.lastSeen}
            </div>
          </div>
        </div>
        <RippleBtn><Icon name="video_call" size={22} color={m3.primary} /></RippleBtn>
        <RippleBtn><Icon name="phone" size={22} color={m3.primary} /></RippleBtn>
        <div style={{ position: "relative" }}>
          <RippleBtn onClick={() => setShowMenu(v => !v)}><Icon name="more_vert" size={22} color={m3.onSurfaceVariant} /></RippleBtn>
          {showMenu && (
            <div onClick={() => setShowMenu(false)} style={{
              position: "absolute", top: 40, right: 0, background: "#fff",
              borderRadius: 8, boxShadow: "0 4px 20px rgba(0,0,0,0.18)",
              minWidth: 210, zIndex: 100, overflow: "hidden", paddingTop: 4, paddingBottom: 4
            }}>
              {menuItems.map((item, i) => (
                <div key={i} style={{
                  padding: "12px 20px", fontSize: 14, color: item === "Clear chat" ? m3.error : m3.onSurface,
                  cursor: "pointer", fontFamily: "'Roboto', sans-serif",
                  background: "#fff", transition: "background 0.1s"
                }}
                  onMouseEnter={e => e.currentTarget.style.background = m3.surfaceVariant}
                  onMouseLeave={e => e.currentTarget.style.background = "#fff"}
                >{item}</div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", padding: "10px 10px 6px" }}>
        <div style={{ textAlign: "center", marginBottom: 12 }}>
          <span style={{ background: "rgba(255,255,255,0.75)", borderRadius: 8, padding: "4px 14px", fontSize: 12, color: "#5d4037", fontFamily: "'Roboto', sans-serif" }}>Today</span>
        </div>
        {grouped.map((group, gi) => (
          <div key={gi} style={{ display: "flex", flexDirection: "column", alignItems: group.from === "me" ? "flex-end" : "flex-start", marginBottom: 6 }}>
            {group.msgs.map((msg, mi) => (
              <div key={msg.id} style={{ marginBottom: 2 }}>
                <div style={{
                  maxWidth: 260,
                  background: group.from === "me" ? m3.primary : "#fff",
                  color: group.from === "me" ? "#fff" : m3.onSurface,
                  borderRadius: group.from === "me"
                    ? (mi === 0 ? "18px 18px 4px 18px" : mi === group.msgs.length - 1 ? "18px 4px 18px 18px" : "18px 4px 4px 18px")
                    : (mi === 0 ? "18px 18px 18px 4px" : mi === group.msgs.length - 1 ? "4px 18px 18px 18px" : "4px 18px 18px 4px"),
                  padding: "8px 10px 6px",
                  boxShadow: "0 1px 2px rgba(0,0,0,0.12)",
                }}>
                  <span style={{ fontSize: 14.5, lineHeight: 1.45, fontFamily: "'Roboto', sans-serif", wordBreak: "break-word" }}>{msg.text}</span>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 3, marginTop: 1 }}>
                    <span style={{ fontSize: 11, opacity: 0.65, fontFamily: "'Roboto', sans-serif" }}>{msg.time}</span>
                    {group.from === "me" && (
                      msg.status === "read"
                        ? <Icon name="check_double" size={14} color="rgba(255,255,255,0.9)" />
                        : msg.status === "delivered"
                          ? <Icon name="check_double" size={14} color="rgba(255,255,255,0.55)" />
                          : <Icon name="check_done" size={14} color="rgba(255,255,255,0.55)" />
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>

      {/* M3 Message input */}
      <div style={{ background: m3.surface }}>
        {/* Emoji picker */}
        {showEmoji && (
          <div style={{
            padding: "10px 8px", background: m3.surface,
            borderTop: `1px solid ${m3.outline}33`,
            display: "flex", flexWrap: "wrap", gap: 2, maxHeight: 160, overflowY: "auto"
          }}>
            {EMOJIS.map((emoji, i) => (
              <button key={i} onClick={() => { setInput(prev => prev + emoji); inputRef.current && inputRef.current.focus(); }}
                style={{ fontSize: 22, background: "none", border: "none", cursor: "pointer", padding: "4px 5px", borderRadius: 6, lineHeight: 1 }}
                onMouseEnter={e => e.currentTarget.style.background = m3.surfaceVariant}
                onMouseLeave={e => e.currentTarget.style.background = "none"}
              >{emoji}</button>
            ))}
          </div>
        )}
        <div style={{ padding: "6px 8px 10px", display: "flex", alignItems: "flex-end", gap: 8 }}>
          <div style={{
            flex: 1, display: "flex", alignItems: "center", gap: 6,
            background: m3.surfaceVariant, borderRadius: 28, padding: "6px 12px",
          }}>
            <button onClick={() => setShowEmoji(v => !v)} style={{
              background: "none", border: "none", cursor: "pointer", padding: 4, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 50,
            }}>
              <Icon name="emoji" size={22} color={showEmoji ? m3.primary : m3.onSurfaceVariant} />
            </button>
            <input
              ref={inputRef}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && send()}
              placeholder="Message"
              style={{ flex: 1, border: "none", outline: "none", fontSize: 15, color: m3.onSurface, background: "none", fontFamily: "'Roboto', sans-serif" }}
            />
            <RippleBtn style={{ padding: 4 }}><Icon name="attach" size={22} color={m3.onSurfaceVariant} /></RippleBtn>
            {!input && <RippleBtn style={{ padding: 4 }}><Icon name="camera" size={22} color={m3.onSurfaceVariant} /></RippleBtn>}
          </div>
          <button onClick={send} style={{
            width: 50, height: 50, borderRadius: "50%", background: m3.primary,
            border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            boxShadow: "0 3px 8px rgba(0,0,0,0.25)", flexShrink: 0,
          }}>
            {input ? <Icon name="send" size={22} color="#fff" /> : <Icon name="mic" size={22} color="#fff" />}
          </button>
        </div>
      </div>
    </div>
  );
};

// ─── UPDATES SCREEN ───────────────────────────────────────────────────────────
const UpdatesScreen = ({ m3 }) => {
  const [viewed, setViewed] = useState({});
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: m3.surface }}>
      <div style={{ padding: "8px 4px 4px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontFamily: "'Google Sans', sans-serif", fontSize: 22, fontWeight: 400, color: m3.onSurface }}>Updates</span>
        <div style={{ display: "flex" }}>
          <RippleBtn><Icon name="search" size={22} color={m3.onSurfaceVariant} /></RippleBtn>
          <RippleBtn><Icon name="more_vert" size={22} color={m3.onSurfaceVariant} /></RippleBtn>
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto" }}>
        {/* My status */}
        <div style={{ padding: "10px 16px", display: "flex", alignItems: "center", gap: 14, cursor: "pointer", borderBottom: `1px solid ${m3.surfaceVariant}` }}>
          <div style={{ position: "relative" }}>
            <div style={{ width: 54, height: 54, borderRadius: "50%", background: m3.primary, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 18, fontWeight: 500, fontFamily: "'Google Sans', sans-serif" }}>ME</div>
            <div style={{ position: "absolute", bottom: 0, right: 0, width: 20, height: 20, borderRadius: "50%", background: m3.primary, border: "2px solid #fff", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="plus" size={12} color="#fff" />
            </div>
          </div>
          <div>
            <div style={{ fontFamily: "'Google Sans', sans-serif", fontWeight: 500, fontSize: 15.5, color: m3.onSurface }}>My status</div>
            <div style={{ fontSize: 13, color: m3.onSurfaceVariant, fontFamily: "'Roboto', sans-serif" }}>Add to my status</div>
          </div>
        </div>

        <div style={{ padding: "10px 16px 4px", fontSize: 12, fontWeight: 500, color: m3.onSurfaceVariant, textTransform: "uppercase", letterSpacing: 0.8, fontFamily: "'Roboto', sans-serif" }}>Recent updates</div>

        {STATUS_DATA.map((s, i) => {
          const contact = CONTACTS.find(c => c.id === s.contactId);
          const isViewed = viewed[s.contactId] || s.viewed;
          return (
            <div key={i} onClick={() => setViewed(prev => ({ ...prev, [s.contactId]: true }))}
              style={{ padding: "10px 16px", display: "flex", alignItems: "center", gap: 14, cursor: "pointer", borderBottom: `1px solid ${m3.surfaceVariant}` }}>
              <div style={{
                width: 56, height: 56, borderRadius: "50%", padding: 3,
                background: isViewed ? "#ccc" : `conic-gradient(${m3.primary} 0%, ${m3.primary} 65%, #E8F5E9 65%)`,
              }}>
                <div style={{ width: "100%", height: "100%", borderRadius: "50%", background: "#fff", padding: 2, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Avatar contact={contact} size={44} />
                </div>
              </div>
              <div>
                <div style={{ fontFamily: "'Google Sans', sans-serif", fontWeight: 500, fontSize: 15.5, color: m3.onSurface }}>{contact.name}</div>
                <div style={{ fontSize: 13, color: m3.onSurfaceVariant, fontFamily: "'Roboto', sans-serif" }}>{s.time}</div>
              </div>
            </div>
          );
        })}

        <div style={{ padding: "10px 16px 4px", fontSize: 12, fontWeight: 500, color: m3.onSurfaceVariant, textTransform: "uppercase", letterSpacing: 0.8, fontFamily: "'Roboto', sans-serif" }}>Channels</div>
        <div style={{ padding: "24px 16px", textAlign: "center" }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>📡</div>
          <div style={{ fontFamily: "'Google Sans', sans-serif", fontWeight: 500, fontSize: 16, color: m3.onSurface, marginBottom: 6 }}>Stay updated on topics that matter</div>
          <div style={{ fontSize: 13.5, color: m3.onSurfaceVariant, marginBottom: 20, fontFamily: "'Roboto', sans-serif" }}>Find channels to follow</div>
          <button style={{ background: m3.primary, color: "#fff", border: "none", borderRadius: 20, padding: "10px 28px", fontSize: 14, fontWeight: 500, cursor: "pointer", fontFamily: "'Google Sans', sans-serif" }}>
            Explore channels
          </button>
        </div>
      </div>
      <FAB icon="edit" color={m3.primary} onClick={() => {}} />
    </div>
  );
};

// ─── CALLS SCREEN ─────────────────────────────────────────────────────────────
const CallsScreen = ({ m3 }) => (
  <div style={{ display: "flex", flexDirection: "column", height: "100%", background: m3.surface }}>
    <div style={{ padding: "8px 4px 4px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
      <span style={{ fontFamily: "'Google Sans', sans-serif", fontSize: 22, fontWeight: 400, color: m3.onSurface }}>Calls</span>
      <div style={{ display: "flex" }}>
        <RippleBtn><Icon name="search" size={22} color={m3.onSurfaceVariant} /></RippleBtn>
        <RippleBtn><Icon name="more_vert" size={22} color={m3.onSurfaceVariant} /></RippleBtn>
      </div>
    </div>
    <div style={{ flex: 1, overflowY: "auto" }}>
      <div style={{ padding: "8px 16px 6px", fontSize: 12, fontWeight: 500, color: m3.onSurfaceVariant, textTransform: "uppercase", letterSpacing: 0.8, fontFamily: "'Roboto', sans-serif" }}>Recent</div>
      {CALLS_DATA.map((call, i) => {
        const contact = CONTACTS.find(c => c.id === call.contactId);
        return (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "10px 16px", borderBottom: `1px solid ${m3.surfaceVariant}` }}>
            <Avatar contact={contact} size={48} />
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: "'Google Sans', sans-serif", fontWeight: 500, fontSize: 15.5, color: call.missed ? m3.error : m3.onSurface }}>{contact.name}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 3 }}>
                {call.missed
                  ? <Icon name="arrow_in" size={14} color={m3.error} />
                  : call.type === "incoming"
                    ? <Icon name="arrow_in" size={14} color={m3.primary} />
                    : <Icon name="arrow_out" size={14} color={m3.primary} />}
                <span style={{ fontSize: 12.5, color: m3.onSurfaceVariant, fontFamily: "'Roboto', sans-serif" }}>
                  {call.missed ? "Missed · " : call.type === "incoming" ? "Incoming · " : "Outgoing · "}{call.time}{call.duration ? ` · ${call.duration}` : ""}
                </span>
              </div>
            </div>
            <RippleBtn>
              {call.video ? <Icon name="video_call" size={22} color={m3.primary} /> : <Icon name="phone" size={22} color={m3.primary} />}
            </RippleBtn>
          </div>
        );
      })}
    </div>
    <FAB icon="phone" color={m3.primary} onClick={() => {}} />
  </div>
);

// ─── COMMUNITY SCREEN (replaces Settings in bottom nav) ──────────────────────
const CommunityScreen = ({ m3 }) => (
  <div style={{ display: "flex", flexDirection: "column", height: "100%", background: m3.surface }}>
    <div style={{ padding: "8px 4px 4px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
      <span style={{ fontFamily: "'Google Sans', sans-serif", fontSize: 22, fontWeight: 400, color: m3.onSurface }}>Communities</span>
      <RippleBtn><Icon name="more_vert" size={22} color={m3.onSurfaceVariant} /></RippleBtn>
    </div>
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, textAlign: "center" }}>
      <div style={{ fontSize: 60, marginBottom: 16 }}>🏘️</div>
      <div style={{ fontFamily: "'Google Sans', sans-serif", fontWeight: 500, fontSize: 20, color: m3.onSurface, marginBottom: 10 }}>Stay connected with a community</div>
      <div style={{ fontSize: 14, color: m3.onSurfaceVariant, marginBottom: 28, lineHeight: 1.6, fontFamily: "'Roboto', sans-serif" }}>Communities bring groups together under one space. Create yours or find one to join.</div>
      <button style={{ background: m3.primary, color: "#fff", border: "none", borderRadius: 20, padding: "12px 32px", fontSize: 15, fontWeight: 500, cursor: "pointer", fontFamily: "'Google Sans', sans-serif" }}>
        New community
      </button>
    </div>
  </div>
);

// ─── M3 BOTTOM NAV ─────────────────────────────────────────────────────────────
const BottomNav = ({ tab, setTab, m3 }) => {
  const tabs = [
    { id: "chats", icon: "chat", label: "Chats", badge: 4 },
    { id: "updates", icon: "updates", label: "Updates", badge: 2 },
    { id: "community", icon: "community", label: "Communities" },
    { id: "calls", icon: "calls", label: "Calls" },
  ];
  return (
    <div style={{
      display: "flex", background: m3.surface,
      borderTop: `1px solid ${m3.outline}22`,
      paddingBottom: 8,
    }}>
      {tabs.map(t => {
        const active = tab === t.id;
        return (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
            gap: 3, padding: "10px 4px 2px", background: "none", border: "none", cursor: "pointer",
          }}>
            {/* M3 indicator pill */}
            <div style={{
              width: 64, height: 32, borderRadius: 16,
              background: active ? m3.secondaryContainer : "transparent",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "background 0.2s", position: "relative"
            }}>
              <Icon name={t.icon} size={22} color={active ? m3.secondary : m3.onSurfaceVariant} filled={active} />
              {t.badge && !active && (
                <div style={{
                  position: "absolute", top: 2, right: 8,
                  minWidth: 16, height: 16, borderRadius: 8, background: m3.error,
                  color: "#fff", fontSize: 10, fontWeight: 600,
                  display: "flex", alignItems: "center", justifyContent: "center", padding: "0 4px"
                }}>{t.badge}</div>
              )}
            </div>
            <span style={{
              fontSize: 11.5, fontFamily: "'Roboto', sans-serif",
              fontWeight: active ? 500 : 400,
              color: active ? m3.secondary : m3.onSurfaceVariant
            }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
};

// ─── APP ─────────────────────────────────────────────────────────────────────
const App = () => {
  const [t] = useTweaks(TWEAK_DEFAULTS);
  const m3 = M3(t.accentColor);

  const [tab, setTab] = useState("chats");
  const [openChat, setOpenChat] = useState(null);

  return (
    <>
      <AndroidDevice>
        <div style={{ display: "flex", flexDirection: "column", height: "100%", background: m3.surface }}>
          {openChat ? (
            <ChatScreen contactId={openChat} onBack={() => setOpenChat(null)} m3={m3} />
          ) : (
            <>
              <div style={{ flex: 1, overflowY: "auto", position: "relative" }}>
                {tab === "chats" && <ChatsScreen onOpenChat={setOpenChat} m3={m3} />}
                {tab === "updates" && <UpdatesScreen m3={m3} />}
                {tab === "calls" && <CallsScreen m3={m3} />}
                {tab === "community" && <CommunityScreen m3={m3} />}
              </div>
              <BottomNav tab={tab} setTab={setTab} m3={m3} />
            </>
          )}
        </div>
      </AndroidDevice>
      <TweaksPanel defaults={TWEAK_DEFAULTS}>
        <TweakSection title="Theme">
          <TweakColor id="accentColor" label="Primary Color" />
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
