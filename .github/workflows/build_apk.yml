name: Build & Publish APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.2) â€” leave blank to keep current'
        required: false
        default: ''
      release_notes:
        description: 'Release notes'
        required: false
        default: 'Bug fixes and improvements'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version & build number
        id: ver
        run: |
          CURRENT_VER=$(jq -r '.latestVersion' backend/version.json)
          CURRENT_BUILD=$(jq -r '.buildNumber' backend/version.json)
          INPUT_VER="${{ github.event.inputs.version }}"
          NEW_VER="${INPUT_VER:-$CURRENT_VER}"
          NEW_BUILD=$((CURRENT_BUILD + 1))
          APK_FILE="schatapp-v${NEW_VER}-b${NEW_BUILD}.apk"

          jq --arg v "$NEW_VER" \
             --argjson b "$NEW_BUILD" \
             --arg n "${{ github.event.inputs.release_notes }}" \
             --arg f "$APK_FILE" \
             '.latestVersion=$v | .buildNumber=$b | .releaseNotes=$n | .apkFilename=$f' \
             backend/version.json > tmp.json && mv tmp.json backend/version.json

          sed -i "s/^version: .*/version: ${NEW_VER}+${NEW_BUILD}/" flutter_app/pubspec.yaml

          echo "version=$NEW_VER" >> $GITHUB_OUTPUT
          echo "build=$NEW_BUILD"  >> $GITHUB_OUTPUT
          echo "apk_file=$APK_FILE" >> $GITHUB_OUTPUT

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Build release APK
        run: cd flutter_app && flutter build apk --release

      - name: Copy APK to backend/public
        run: |
          mkdir -p backend/public
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             backend/public/${{ steps.ver.outputs.apk_file }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/version.json flutter_app/pubspec.yaml backend/public/
          git commit -m "release: v${{ steps.ver.outputs.version }}+${{ steps.ver.outputs.build }}"
          git push
